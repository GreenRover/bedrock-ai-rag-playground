# Url part of the cluster
clusterurl: apps.trs01p.sbb-aws.net
# The image pull policy
imagePullPolicy: IfNotPresent
# stage
stage: tms-ssp
# splunk_index
splunkIndex: sbb_tms-ssp_internal_prod_events

vaultStageSuffix: prod

backend:
  cpuMin: 100m
  cpuMax: 500m
  memoryMax: 3G
  # number of replicas of backend
  replicas: 1 # high availability is not yet supported for tms-ssp-chat
  tmsStage: p
  url: tms-ssp-chat.sbb-cloud.net