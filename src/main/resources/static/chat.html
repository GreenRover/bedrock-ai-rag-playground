<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STTRS messaging support chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container py-4 d-flex flex-column" style="height: 100vh; max-width: 900px;">
        <h1 class="text-center mb-4 text-primary"><i class="bi bi-chat-dots"></i> STTRS messaging support chat</h1>
        <div id="chat-box" class="flex-grow-1 bg-white rounded shadow-sm p-3 mb-3 overflow-auto"></div>
        <div id="input-container" class="input-group shadow-sm">
            <input type="text" id="message-input" class="form-control form-control-lg" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button class="btn btn-primary px-4" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
