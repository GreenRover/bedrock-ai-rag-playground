management:
  endpoints:
    web:
      exposure:
        include: "prometheus,health,info"
  endpoint:
    health:
      show-details: always
      show-components: always
  metrics:
    export:
      solacekpi:
        abb1: tms
        abb2: plattform
        abb3: tms-ssp
        stage: ${TMS_STAGE:d}
        monalesy-stage: p
        groups:
          - keyframeInterval: PT15M
            incrementalSendInterval: PT30S
            groupName: chat
            metricInclusionsRegex:
              - .*
server:
  port: ${HTTP_PORT:8495}

logging:
  level:
    dev:
      langchain4j: ${LOG_LEVEL:INFO}
    ch:
      sbb: ${LOG_LEVEL:INFO}
      sbb.micrometer: ${KPI_LOG_LEVEL:INFO}
    org:
      springframework:
        web: ${LOG_LEVEL:INFO}
        http:
          client: ${LOG_LEVEL:INFO}
    com:
      solacesystems:
        jcsmp: ${SOLACE_LOG_LEVEL:WARN}
    root: ${LOG_LEVEL_ROOT:INFO}