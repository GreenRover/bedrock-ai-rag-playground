spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}/${DB_NAME:tms-ssp}?currentSchema=${DB_SCHEMA:public}
    username: ${DB_USERNAME:tms-ssp}
    password: ${DB_PASSWORD:tms-ssp}
  application:
    name: my-ai-spring-ai
  main:
    banner-mode: off

confluence:
  api:
    url: ${confluence.base-url}
    token: ${confluence.token}
  base-url: https://confluence.sbb.ch
  start-page-id:
  - 1262683220 # sttrs messaging
  - 1257836039 # TRS Monitoring Alerting
  - 1769768106 # Architecture+Governance
  - 1916372937 # esta tekton pipeline
  - 3206067402 # aitg api provider
  token: ${CONFLUENCE_TOKEN}

github:
  token: ${GITHUB_TOKEN}
  repositories:
    - https://github.com/SchweizerischeBundesbahnen/spring-cloud-stream-binder
    - https://github.com/solacecommunity/solace-prometheus-exporter
    - https://github.com/solacecommunity/spring-boot-starter-solace-client-config
    - https://github.com/solacecommunity/spring-cloud-stream-request-reply
    - https://github.com/solacecommunity/spring-solace-leader-election
    - https://github.com/solacecommunity/angular-solace-message-client

aws:
  bedrock:
    token: ${AWS_BEARER_TOKEN_BEDROCK}

rag:
  data:
    export-dir: data_export
  chat:
    model-id: "eu.amazon.nova-pro-v1:0"
    temperature: 0.1
    max-output-tokens: 1000
  retriever:
    max-results: 100
    min-score: 0.65
    max-context-length: 40000

bitbucket:
  token: ${BITBUCKET_TOKEN}
  repositories:
    - https://code.sbb.ch/projects/TP_TMS_PLATTFORM/repos/tms-broker-deployment-engine/browse
